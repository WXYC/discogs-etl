name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v

  pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: discogs
          POSTGRES_PASSWORD: discogs
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U discogs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" pytest-cov
      - name: Enable pg_trgm extension
        run: |
          PGPASSWORD=discogs psql -h localhost -p 5433 -U discogs -d postgres \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
      - name: Install wxyc_unaccent rules into the PG service container
        # Required by alembic migration 0004 before
        # `CREATE TEXT SEARCH DICTIONARY wxyc_unaccent (... RULES = 'wxyc_unaccent')`.
        # Alpine layout: /usr/local/share/postgresql/tsearch_data (no version subdir).
        run: |
          PG_CID=$(docker ps -q --filter ancestor=postgres:16-alpine)
          if [ -z "$PG_CID" ]; then
            echo "no postgres:16-alpine service container running" >&2
            exit 1
          fi
          docker cp vendor/wxyc-etl/wxyc_unaccent.rules \
            "$PG_CID:/usr/local/share/postgresql/tsearch_data/wxyc_unaccent.rules"
          docker cp vendor/wxyc-etl/wxyc_unaccent.version \
            "$PG_CID:/usr/local/share/postgresql/tsearch_data/wxyc_unaccent.version"
      - name: Run pg-marked + default tests with coverage
        env:
          DATABASE_URL_TEST: postgresql://discogs:discogs@localhost:5433/postgres
        # The expression "pg or not slow" selects PG-marked tests plus the
        # default no-marker tests (everything that is not `slow`). Running
        # both in a single invocation means the --cov-fail-under gate sees
        # combined coverage. The positive `pg` term satisfies the marker
        # sync-check.
        run: >-
          pytest -v
          -m "pg or not slow"
          --cov=scripts --cov=lib
          --cov-report=term-missing
          --cov-fail-under=60

  marker-sync:
    uses: WXYC/wxyc-etl/.github/workflows/check-ci-marker-sync.yml@gha/v1
    with:
      repo-path: "."
      workflows-dir: ".github/workflows"
      tests-dir: "tests"
      wxyc-etl-ref: gha/v1
