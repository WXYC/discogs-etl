name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install wxyc-etl from git (Rust/PyO3)
        run: |
          pip install maturin
          git clone --depth 1 --branch etl-unification/1g-pyo3-bindings https://github.com/WXYC/wxyc-etl.git /tmp/wxyc-etl
          cd /tmp/wxyc-etl/wxyc-etl-python && maturin build --release && pip install /tmp/wxyc-etl/target/wheels/*.whl
      - name: Install wxyc-catalog from git
        run: |
          git clone --depth 1 --branch main https://github.com/WXYC/wxyc-catalog.git /tmp/wxyc-catalog
          cd /tmp/wxyc-catalog && sed -i 's|setuptools.backends._legacy:_Backend|setuptools.build_meta|' pyproject.toml && pip install -e .
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v

  pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: discogs
          POSTGRES_PASSWORD: discogs
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U discogs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install wxyc-etl from git (Rust/PyO3)
        run: |
          pip install maturin
          git clone --depth 1 --branch etl-unification/1g-pyo3-bindings https://github.com/WXYC/wxyc-etl.git /tmp/wxyc-etl
          cd /tmp/wxyc-etl/wxyc-etl-python && maturin build --release && pip install /tmp/wxyc-etl/target/wheels/*.whl
      - name: Install wxyc-catalog from git
        run: |
          git clone --depth 1 --branch main https://github.com/WXYC/wxyc-catalog.git /tmp/wxyc-catalog
          cd /tmp/wxyc-catalog && sed -i 's|setuptools.backends._legacy:_Backend|setuptools.build_meta|' pyproject.toml && pip install -e .
      - run: pip install -e ".[dev]" pytest-cov
      - name: Enable pg_trgm extension
        run: |
          PGPASSWORD=discogs psql -h localhost -p 5433 -U discogs -d postgres \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
      - name: Run pg-marked + default tests with coverage
        env:
          DATABASE_URL_TEST: postgresql://discogs:discogs@localhost:5433/postgres
        # The expression "pg or not slow" selects PG-marked tests plus the
        # default no-marker tests (everything that is not `slow`). Running
        # both in a single invocation means the --cov-fail-under gate sees
        # combined coverage. The positive `pg` term satisfies the marker
        # sync-check.
        run: >-
          pytest -v
          -m "pg or not slow"
          --cov=scripts --cov=lib
          --cov-report=term-missing
          --cov-fail-under=60

  marker-sync:
    uses: WXYC/wxyc-etl/.github/workflows/check-ci-marker-sync.yml@main
    with:
      repo-path: "."
      workflows-dir: ".github/workflows"
      tests-dir: "tests"
