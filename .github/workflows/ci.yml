name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow-level GITHUB_TOKEN scope. No job in this file pushes code,
# comments on PRs, or creates releases; all writes to external services
# use their own non-GITHUB_TOKEN secrets. contents:read is the safe floor.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v

  pg:
    runs-on: ubuntu-latest
    services:
      postgres:
        # Custom image overlaying wxyc_unaccent.rules onto railwayapp-templates/postgres-ssl
        # so the F0000 precheck in alembic 0007 finds the rules file at
        # $SHAREDIR/tsearch_data/. Built + published by WXYC/wxyc-etl#127. See
        # docs/wxyc-postgres-image.md for the operator runbook.
        image: ghcr.io/wxyc/wxyc-postgres:pg16
        env:
          POSTGRES_USER: discogs
          POSTGRES_PASSWORD: discogs
          POSTGRES_DB: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U discogs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]" pytest-cov
      - name: Enable pg_trgm extension
        run: |
          PGPASSWORD=discogs psql -h localhost -p 5433 -U discogs -d postgres \
            -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
      # The wxyc-postgres image (above) ships wxyc_unaccent.rules at
      # /usr/local/share/postgresql/tsearch_data/wxyc_unaccent.rules so
      # alembic 0007's CREATE TEXT SEARCH DICTIONARY precheck finds it. No
      # docker-cp staging step needed — that's the whole point of Option B.
      - name: Run pg-marked + default tests with coverage
        env:
          DATABASE_URL_TEST: postgresql://discogs:discogs@localhost:5433/postgres
        # The expression "pg or not slow" selects PG-marked tests plus the
        # default no-marker tests (everything that is not `slow`). Running
        # both in a single invocation means the --cov-fail-under gate sees
        # combined coverage. The positive `pg` term satisfies the marker
        # sync-check.
        run: >-
          pytest -v
          -m "pg or not slow"
          --cov=scripts --cov=lib
          --cov-report=term-missing
          --cov-fail-under=60

  marker-sync:
    uses: WXYC/wxyc-etl/.github/workflows/check-ci-marker-sync.yml@gha/v1
    with:
      repo-path: "."
      workflows-dir: ".github/workflows"
      tests-dir: "tests"
      wxyc-etl-ref: gha/v1
