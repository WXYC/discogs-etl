name: Rebuild Discogs Cache

# Monthly Discogs cache rebuild. Discogs publishes a new dump on the 1st of
# each month; this workflow runs a few days later to give the dump time to
# settle and to stagger against sister cache-builder repos (e.g. wikidata-cache,
# musicbrainz-cache).
#
# The pipeline forwards `--library-db` to discogs-xml-converter, which
# applies its built-in pair-wise (artist, title) filter inside the
# streaming scanner. That narrows release output from ~4M to ~50K rows
# before the import step. Without it, the import overflows small
# destination DBs (Railway-sized) at `COPY release_artist` — see
# WXYC/discogs-etl#128 and WXYC/discogs-xml-converter#45.
#
# Library catalog: this workflow consumes the `library.db` produced daily by
# `sync-library.yml` (uploaded as an asset on the `streaming-data-v1` release
# in WXYC/library-metadata-lookup). Earlier iterations called
# `--generate-library-db --catalog-source tubafrenzy` here, but Kattare's
# MySQL is not directly internet-reachable — the daily sync workflow tunnels
# in over SSH. Reusing its output asset keeps that connectivity story in one
# place and avoids duplicating SSH credentials across workflows.
#
# Disk: the Discogs releases dump is multi-tens-of-GB compressed and
# expands to ~80 GB raw XML, well beyond the GitHub Actions free-runner
# disk budget (~14 GB). The dump is therefore *streamed* through a named
# pipe straight into the converter rather than materialised on disk —
# only the much smaller filtered CSV outputs land on the runner. See the
# `Run pipeline (with streamed dump)` step.
#
# Wall-clock: a single-pass parse of the dump is still bounded by the
# 6-hour free-runner budget. If a future month's dump pushes past that,
# the next escalation is `runs-on: ubuntu-latest-large` (paid hosted) or
# a self-hosted runner.

# 2026-05-05: cron disabled. Two cron-tick attempts demonstrated that the
# rebuild doesn't fit a GitHub-hosted runner: the dump-host's Cloudflare
# front blocks GH-runner egress IPs (the same `data.discogs.com/?download=`
# URL serves 200 to residential IPs and 403 from a runner), and even past
# that the workflow eats meaningful Actions minutes for a job that runs
# fine in ~half an hour on hardware co-located with the destination DB.
# Tracking the migration to a Railway cron service in WXYC/discogs-etl.
# `workflow_dispatch` is kept as a manual escape hatch.
on:
  workflow_dispatch:
    inputs:
      dump_url:
        description: "Override Discogs releases.xml.gz URL (optional)"
        required: false
        type: string

# Workflow-level GITHUB_TOKEN scope. No job in this file pushes code,
# comments on PRs, or creates releases; all writes to external services
# use their own non-GITHUB_TOKEN secrets. contents:read is the safe floor.
permissions:
  contents: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install discogs-etl
        run: pip install -e ".[dev]"

      - name: Build discogs-xml-converter
        run: |
          git clone --depth 1 --branch main https://github.com/WXYC/discogs-xml-converter.git /tmp/discogs-xml-converter
          cd /tmp/discogs-xml-converter && cargo build --release
          echo "/tmp/discogs-xml-converter/target/release" >> "$GITHUB_PATH"

      # Migration steps run BEFORE the dump download/resolve so a missing stamp
      # or DB connectivity problem fails the workflow inside ~30 seconds rather
      # than after a 10-20 minute, ~63 GB dump download.

      # Guard: an unstamped DB is unexpected operator state. The migration's
      # populated-schema short-circuit makes a stray `alembic upgrade head`
      # against an unstamped+populated DB safe (it implicitly stamps), but the
      # workflow should still abort and prompt the operator rather than spend
      # bandwidth on a dump rebuild against a DB that may not be the one they
      # intended. The one-time stamp procedure lives in docs/migrations-runbook.md.
      - name: Verify alembic baseline is stamped
        env:
          PGURL: ${{ secrets.DATABASE_URL_DISCOGS }}
        run: |
          set -euo pipefail
          # Probe the connection first so a credentials/network failure doesn't
          # masquerade as "alembic_version missing" below. `set -e` propagates
          # psql's exit code with its own diagnostics on connection error.
          psql "$PGURL" -c "SELECT 1" >/dev/null
          version=$(psql "$PGURL" -tAc "SELECT version_num FROM alembic_version" 2>/dev/null || true)
          if [ -z "$version" ]; then
            echo "::error::alembic_version table missing or empty on this database. Run the one-time stamp procedure in docs/migrations-runbook.md against this DB before re-running the workflow. Aborting before download to avoid wasting bandwidth."
            exit 1
          fi
          echo "Current alembic version: $version"

      - name: Apply pending alembic migrations
        env:
          DATABASE_URL_DISCOGS: ${{ secrets.DATABASE_URL_DISCOGS }}
        run: alembic upgrade head

      - name: Resolve dump URL
        id: dump
        env:
          OVERRIDE_URL: ${{ inputs.dump_url }}
        run: |
          # Direct S3 (discogs-data-dumps.s3.us-west-2.amazonaws.com) returns
          # 403 to anonymous requests as of 2026-05; downloads are gated through
          # data.discogs.com which signs/proxies the request. Use the public
          # download endpoint with URL-encoded `data/<YYYY>/<file>` after the
          # `?download=` query parameter.
          if [ -n "$OVERRIDE_URL" ]; then
            echo "Using operator-supplied dump URL"
            echo "url=$OVERRIDE_URL" >> "$GITHUB_OUTPUT"
          else
            # Discogs publishes monthly dumps named
            # data/<YYYY>/discogs_<YYYYMMDD>_releases.xml.gz on the 1st of each
            # month. Resolve the most recent published month relative to today.
            year=$(date -u +%Y)
            stamp=$(date -u +%Y%m01)
            echo "url=https://data.discogs.com/?download=data%2F${year}%2Fdiscogs_${stamp}_releases.xml.gz" >> "$GITHUB_OUTPUT"
          fi

      # Pre-flight: HEAD the dump URL so a 403 (the known GH-runner-egress block
      # at data.discogs.com's Cloudflare front, see header comment) fails inside
      # ~1 second with a named error, instead of being buried 100 lines into the
      # streaming-pipeline step where the backgrounded curl's exit code can be
      # masked by a downstream tool's own failure (the 2026-05-05 pattern: a
      # curl 403 followed by `unrecognized subcommand` from the converter
      # reading an empty FIFO — see #219 root-cause analysis).
      #
      # Uses `curl -sIf --retry 0`: HEAD-only (no payload bytes), fail on HTTP
      # error, no retry (an egress-IP block won't recover within retry window).
      - name: Verify dump URL is reachable
        env:
          DUMP_URL: ${{ steps.dump.outputs.url }}
        run: |
          set -euo pipefail
          if ! curl -sIf --retry 0 --max-time 30 "$DUMP_URL" >/dev/null; then
            status=$(curl -sI --retry 0 --max-time 30 -o /dev/null -w "%{http_code}" "$DUMP_URL" || echo "0")
            echo "::error::HEAD $DUMP_URL returned HTTP $status. data.discogs.com Cloudflare blocks GitHub-hosted runner egress IPs; this workflow is a manual escape hatch only. Production rebuilds run on the wxyc-discogs-rebuild SAM stack (infra/ephemeral-rebuild/) from an EC2 IP that Discogs does not block. To override, dispatch with an explicit dump_url that points at an asset you have already mirrored to a runner-reachable host."
            exit 1
          fi
          echo "Dump URL reachable: HTTP 200"

      # Pull the daily-fresh library.db from sync-library.yml's release artifact
      # rather than regenerating it here from MySQL. Kattare's MySQL is reachable
      # only through an SSH tunnel; sync-library.yml owns that tunnel + handles
      # MySQL 4.1 quirks via the MariaDB CLI. By the time this monthly cron tick
      # fires (06:00 UTC on the 4th), the previous day's sync upload (12:00 UTC
      # on the 3rd) is the freshest available snapshot.
      #
      # `gh release download --pattern` filters to the single asset we need, so
      # we don't pull the much-larger streaming_availability.db that ships in
      # the same release. ${{ github.token }} has read scope on public repos
      # (LML is public); the upstream upload step uses LML_RELEASE_TOKEN.
      - name: Download library.db from LML release artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p data
          gh release download streaming-data-v1 \
            --repo WXYC/library-metadata-lookup \
            --pattern library.db \
            --output data/library.db
          echo "library.db size: $(du -h data/library.db | cut -f1)"

      # Stream the dump through a named pipe instead of materializing it on
      # disk. Compressed releases.xml.gz is multi-tens-of-GB and expanded XML
      # exceeds the GitHub Actions free-runner disk (~14 GB) by an order of
      # magnitude. The converter (discogs-xml-converter) detects gzip by the
      # `.gz` extension and decodes via flate2's GzDecoder, which is a pure
      # streaming reader — feeding it from a FIFO works the same as feeding
      # it from a real file.
      #
      # Layout: curl runs in the background writing into the FIFO; the pipeline
      # invocation runs the converter against that FIFO. Kernel pipe buffer
      # backpressures curl when the converter falls behind.
      #
      # Curl-failure handling (#219): the backgrounded curl writes its exit
      # status to data/curl.status when it terminates. If curl exits non-zero
      # before the pipeline opens the FIFO, the FIFO sees EOF immediately and
      # the python script fails for a *different* reason (e.g. converter
      # rejecting empty input), masking the real network failure. By checking
      # the status file before propagating the python exit code, we surface
      # the curl failure with priority over the masked downstream error.
      - name: Run pipeline (with streamed dump)
        env:
          DATABASE_URL_DISCOGS: ${{ secrets.DATABASE_URL_DISCOGS }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          DUMP_URL: ${{ steps.dump.outputs.url }}
          # When SENTRY_DSN is set as a repo secret, wxyc_etl.logger.init_logger
          # hands exception events to the Sentry SDK. Unset → Sentry stays
          # inactive, JSON logging still emits to stderr.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          mkdir -p data
          mkfifo data/releases.xml.gz
          rm -f data/curl.status
          (
            curl -fL --retry 3 --retry-delay 30 \
              -o data/releases.xml.gz \
              "$DUMP_URL"
            echo "$?" > data/curl.status
          ) &
          CURL_PID=$!

          # Run the pipeline; capture exit code so we can decide whether the
          # network side or the python side failed first.
          set +e
          python scripts/run_pipeline.py \
            --xml data/releases.xml.gz \
            --library-db data/library.db
          PY_RC=$?
          set -e

          # Wait for curl to finish writing curl.status. `wait` returns curl's
          # own exit code; we also read the status file in case curl was killed
          # by SIGPIPE (downstream reader closed early -- python crash) which
          # bash reports as a generic non-zero rather than the underlying HTTP
          # error.
          wait "$CURL_PID" || true
          CURL_RC=$(cat data/curl.status 2>/dev/null || echo "unknown")
          if [ "$CURL_RC" != "0" ]; then
            echo "::error::curl exited $CURL_RC while streaming $DUMP_URL. Pipeline python exited $PY_RC (likely a downstream symptom of empty FIFO input)."
            exit 1
          fi
          if [ "$PY_RC" -ne 0 ]; then
            exit "$PY_RC"
          fi

      # Watchdog: cache_distinct_artists / library_distinct_artists ratio
      # exposes drift between the just-rebuilt cache and the WXYC library
      # catalog. A ratio below --min-ratio fails this step (and the workflow),
      # firing the Slack alert below as a separate signal from "the rebuild
      # itself crashed". Issue #125, third acceptance criterion.
      #
      # Reuses data/library.db that the earlier "Download library.db from LML
      # release artifact" step already pulled — same snapshot the pipeline
      # filtered against, so the drift comparison is apples-to-apples.
      - name: Check cache drift vs. library
        if: success()
        env:
          DATABASE_URL_DISCOGS: ${{ secrets.DATABASE_URL_DISCOGS }}
          SLACK_MONITORING_WEBHOOK: ${{ secrets.SLACK_MONITORING_WEBHOOK }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          python scripts/check_cache_drift.py \
            --library-db data/library.db \
            --min-ratio 0.7

      # Slack alert on any failure in this workflow (rebuild or watchdog).
      # Mirrors the --notify pattern in scripts/sync-library.sh; posts only
      # when SLACK_MONITORING_WEBHOOK is set as a repo secret. Issue #125,
      # second acceptance criterion.
      #
      # When the secret is unset the step emits an `::error::` annotation
      # rather than the previous quiet "skipping Slack post" line. That
      # surfaces on the workflow summary page and on the dispatcher's
      # notification, so the missing-secret state can't itself fall silent —
      # which is what allowed two 2026-05-05 runs to fail unnoticed (#219).
      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_MONITORING_WEBHOOK }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::error::SLACK_MONITORING_WEBHOOK is not set in repo secrets. The workflow failed but no Slack alert was posted. Configure the secret per CLAUDE.md 'Monthly Cache Rebuild' -> 'Required GitHub secrets' so future failures alert. Failing this notifier step so the workflow's overall status remains red and the dispatcher's GitHub notification reflects it."
            exit 1
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\":warning: *Discogs cache rebuild failed*\nRun: $RUN_URL\"}" \
            || true
