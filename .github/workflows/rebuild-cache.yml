name: Rebuild Discogs Cache

# Monthly Discogs cache rebuild. Discogs publishes a new dump on the 1st of
# each month; this workflow runs a few days later to give the dump time to
# settle and to stagger against sister cache-builder repos (e.g. wikidata-cache,
# musicbrainz-cache).
#
# The pipeline runs `--pair-filter`, which narrows the converter's
# artist-only output (~4M release rows) to releases whose (artist, title)
# pair matches the WXYC library (~50K) before the import step. Without
# this, the import overflows small destination DBs (Railway-sized) at
# `COPY release_artist` — see #128.
#
# TODO: the Discogs releases dump is ~63 GB compressed XML; expanding +
# converting it can exceed the GitHub Actions free-runner disk (~14 GB) and
# 6-hour wall-clock budget. The skeleton here lets operators kick the rebuild
# manually via workflow_dispatch on a self-hosted runner or a beefier hosted
# runner; converting the scheduled run to use the same once one is provisioned
# is a follow-up. Until then, the cron tick will fail loudly rather than
# silently producing a half-built cache, which is the desired signal.

on:
  schedule:
    # 06:00 UTC on the 4th of each month (staggered from sister rebuilds).
    - cron: "0 6 4 * *"
  workflow_dispatch:
    inputs:
      dump_url:
        description: "Override Discogs releases.xml.gz URL (optional)"
        required: false
        type: string

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install discogs-etl
        run: pip install -e ".[dev]"

      - name: Build discogs-xml-converter
        run: |
          git clone --depth 1 --branch main https://github.com/WXYC/discogs-xml-converter.git /tmp/discogs-xml-converter
          cd /tmp/discogs-xml-converter && cargo build --release
          echo "/tmp/discogs-xml-converter/target/release" >> "$GITHUB_PATH"

      # Migration steps run BEFORE the dump download/resolve so a missing stamp
      # or DB connectivity problem fails the workflow inside ~30 seconds rather
      # than after a 10-20 minute, ~63 GB dump download.

      # Guard: an unstamped DB is unexpected operator state. The migration's
      # populated-schema short-circuit makes a stray `alembic upgrade head`
      # against an unstamped+populated DB safe (it implicitly stamps), but the
      # workflow should still abort and prompt the operator rather than spend
      # bandwidth on a dump rebuild against a DB that may not be the one they
      # intended. The one-time stamp procedure lives in docs/migrations-runbook.md.
      - name: Verify alembic baseline is stamped
        env:
          PGURL: ${{ secrets.DATABASE_URL_DISCOGS }}
        run: |
          set -euo pipefail
          # Probe the connection first so a credentials/network failure doesn't
          # masquerade as "alembic_version missing" below. `set -e` propagates
          # psql's exit code with its own diagnostics on connection error.
          psql "$PGURL" -c "SELECT 1" >/dev/null
          version=$(psql "$PGURL" -tAc "SELECT version_num FROM alembic_version" 2>/dev/null || true)
          if [ -z "$version" ]; then
            echo "::error::alembic_version table missing or empty on this database. Run the one-time stamp procedure in docs/migrations-runbook.md against this DB before re-running the workflow. Aborting before download to avoid wasting bandwidth."
            exit 1
          fi
          echo "Current alembic version: $version"

      - name: Apply pending alembic migrations
        env:
          DATABASE_URL_DISCOGS: ${{ secrets.DATABASE_URL_DISCOGS }}
        run: alembic upgrade head

      - name: Resolve dump URL
        id: dump
        env:
          OVERRIDE_URL: ${{ inputs.dump_url }}
        run: |
          if [ -n "$OVERRIDE_URL" ]; then
            echo "Using operator-supplied dump URL"
            echo "url=$OVERRIDE_URL" >> "$GITHUB_OUTPUT"
          else
            # Discogs publishes monthly dumps named
            # data/<YYYY>/discogs_<YYYYMMDD>_releases.xml.gz on the 1st of each
            # month. Resolve the most recent published month relative to today.
            year=$(date -u +%Y)
            stamp=$(date -u +%Y%m01)
            echo "url=https://discogs-data-dumps.s3.us-west-2.amazonaws.com/data/${year}/discogs_${stamp}_releases.xml.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Discogs releases dump
        run: |
          mkdir -p data
          curl -fL --retry 3 --retry-delay 30 -o data/releases.xml.gz "${{ steps.dump.outputs.url }}"

      - name: Run pipeline
        env:
          DATABASE_URL_DISCOGS: ${{ secrets.DATABASE_URL_DISCOGS }}
          DISCOGS_TOKEN: ${{ secrets.DISCOGS_TOKEN }}
          # When SENTRY_DSN is set as a repo secret, wxyc_etl.logger.init_logger
          # hands exception events to the Sentry SDK. Unset → Sentry stays
          # inactive, JSON logging still emits to stderr.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          python scripts/run_pipeline.py \
            --xml data/releases.xml.gz \
            --generate-library-db \
            --catalog-source tubafrenzy \
            --catalog-db-url "${{ secrets.LIBRARY_CATALOG_DB_URL }}" \
            --pair-filter

      # Watchdog: cache_distinct_artists / library_distinct_artists ratio
      # exposes drift between the just-rebuilt cache and the WXYC library
      # catalog. A ratio below --min-ratio fails this step (and the workflow),
      # firing the Slack alert below as a separate signal from "the rebuild
      # itself crashed". Issue #125, third acceptance criterion.
      #
      # The pipeline above generates library.db inside a tempdir that we
      # don't have a handle to here, so we re-export it in this step using
      # the same wxyc-catalog CLI. The export is cheap relative to the
      # pipeline (≈seconds vs hours).
      - name: Check cache drift vs. library
        if: success()
        env:
          DATABASE_URL_DISCOGS: ${{ secrets.DATABASE_URL_DISCOGS }}
          SLACK_MONITORING_WEBHOOK: ${{ secrets.SLACK_MONITORING_WEBHOOK }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          set -euo pipefail
          wxyc-export-to-sqlite \
            --catalog-source tubafrenzy \
            --catalog-db-url "${{ secrets.LIBRARY_CATALOG_DB_URL }}" \
            --output /tmp/library-watchdog.db
          python scripts/check_cache_drift.py \
            --library-db /tmp/library-watchdog.db \
            --min-ratio 0.7

      # Slack alert on any failure in this workflow (rebuild or watchdog).
      # Mirrors the --notify pattern in scripts/sync-library.sh; posts only
      # when SLACK_MONITORING_WEBHOOK is set as a repo secret. Issue #125,
      # second acceptance criterion.
      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_MONITORING_WEBHOOK }}
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_MONITORING_WEBHOOK unset; skipping Slack post."
            exit 0
          fi
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\":warning: *Discogs cache rebuild failed*\nRun: $RUN_URL\"}" \
            || true
