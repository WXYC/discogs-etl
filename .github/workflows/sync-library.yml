name: Sync Library

on:
  schedule:
    # Daily at noon UTC (7 AM EST / 8 AM EDT)
    - cron: "0 12 * * *"
  workflow_dispatch:

# Workflow-level GITHUB_TOKEN scope. No job in this file pushes code,
# comments on PRs, or creates releases; all writes to external services
# use their own non-GITHUB_TOKEN secrets. contents:read is the safe floor.
# id-token:write is required for OIDC against AWS in the cache-health step.
permissions:
  contents: read
  id-token: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MariaDB client
        run: sudo apt-get install -y mariadb-client

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Kattare host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$LIBRARY_SSH_HOST" >> ~/.ssh/known_hosts
        env:
          LIBRARY_SSH_HOST: ${{ secrets.LIBRARY_SSH_HOST }}

      - name: Set up streaming links enrichment
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main https://github.com/WXYC/library-metadata-lookup.git /tmp/library-metadata-lookup
          # streaming_availability.db is read from the Railway volume (the canonical
          # copy, LML#672), not the GitHub Release. Hard-fail on a non-200 or an
          # empty/invalid file: a naive `curl -o` exits 0 on HTTP 404/500 and writes
          # the error body, which would silently strip all streaming links from prod.
          # On a Railway outage the step aborts and prod keeps yesterday's library.db.
          dest=/tmp/library-metadata-lookup/streaming_availability.db
          http_code=$(curl -sS -w '%{http_code}' -o "$dest" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            "$PRODUCTION_URL/admin/download-streaming-db")
          if [ "$http_code" != "200" ]; then
            echo "::error::download-streaming-db returned HTTP $http_code"
            head -c 2000 "$dest" || true
            exit 1
          fi
          if [ ! -s "$dest" ]; then
            echo "::error::downloaded streaming_availability.db is empty"
            exit 1
          fi
          python -c "import sqlite3,sys; n=sqlite3.connect(sys.argv[1]).execute('SELECT count(*) FROM albums').fetchone()[0]; print('volume streaming_availability.db OK: %d albums' % n); sys.exit(0 if n>0 else 'downloaded streaming_availability.db has 0 albums')" "$dest"
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}

      - name: Run library sync
        run: scripts/sync-library.sh
        env:
          LML_REPO_DIR: /tmp/library-metadata-lookup
          LIBRARY_DB_OUTPUT: /tmp/library.db
          LIBRARY_SSH_HOST: ${{ secrets.LIBRARY_SSH_HOST }}
          LIBRARY_SSH_USER: ${{ secrets.LIBRARY_SSH_USER }}
          LIBRARY_DB_HOST: ${{ secrets.LIBRARY_DB_HOST }}
          LIBRARY_DB_USER: ${{ secrets.LIBRARY_DB_USER }}
          LIBRARY_DB_PASSWORD: ${{ secrets.LIBRARY_DB_PASSWORD }}
          LIBRARY_DB_NAME: ${{ secrets.LIBRARY_DB_NAME }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          STAGING_URL: ${{ secrets.STAGING_URL }}
          PRODUCTION_URL: ${{ secrets.PRODUCTION_URL }}
          # Optional: when SENTRY_DSN is set, scripts/tsv_to_sqlite.py and the
          # other Python entrypoints invoked by sync-library.sh hand exception
          # events to Sentry via wxyc_etl.logger. Unset → Sentry stays inactive,
          # JSON logging still emits to stderr.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Update library.db in LML release
        if: success()
        run: |
          gh release upload streaming-data-v1 /tmp/library.db --clobber --repo WXYC/library-metadata-lookup
        env:
          GH_TOKEN: ${{ secrets.LML_RELEASE_TOKEN }}

      # Per WXYC/discogs-etl#241: publish artwork-state counts to CloudWatch
      # so the never-asked share has a time series we can alarm on. Runs
      # daily alongside the library sync (same cadence the issue recommends).
      - uses: aws-actions/configure-aws-credentials@v6
        if: success()
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Install discogs-etl
        if: success()
        run: pip install -e ".[dev]"

      - name: Publish cache-health metrics
        if: success()
        run: python scripts/cache_health_metrics.py
        env:
          DATABASE_URL_DISCOGS: ${{ secrets.DATABASE_URL_DISCOGS }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
